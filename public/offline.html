<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamu Sedang Offline</title>
    <style>
        :root {
            --bg: #09090b;
            --text: #fafafa;
            --muted: #a1a1aa;
            --border: #27272a;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #ffffff;
                --text: #09090b;
                --muted: #71717a;
                --border: #e4e4e7;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 400px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 12px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 14px;
            color: var(--muted);
            margin: 0 0 32px;
            line-height: 1.5;
        }

        button {
            background-color: var(--text);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">🦖</div>
        <h1>Koneksi Terputus</h1>
        <p>Aplikasi tidak dapat dimuat karena tidak ada jaringan internet. Pastikan data seluler atau Wi-Fi kamu aktif.
        </p>
        <button onclick="window.location.reload()">Coba Lagi</button>
    </div>
</body>

</html>
